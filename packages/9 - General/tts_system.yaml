tts_system_package:
  ##########################
  ## Stuur een TTS-bericht op geselecteerde luidsprekers
  ##########################
  input_text:
    tts_message:
      name: Bericht
      icon: mdi:message-processing-outline
      max: 255

  input_select:
    tts_target:
      name: TTS-doel
      options:
        - Woonkamer
        - Hele huis
        - Bovenverdieping
        - Slaapkamer T
        - Zolder
        - Kantoor
      icon: mdi:cast-audio

  script:
    tts_announce:
      alias: Spreek TTS-bericht uit
      description: "Centrale TTS-wrapper voor omroepberichten"
      icon: mdi:account-voice
      mode: queued
      max: 10
      fields:
        media_player_entity_id:
          description: "Media player waarop het bericht wordt afgespeeld"
          example: media_player.zolder
        message:
          description: "Bericht dat uitgesproken moet worden"
          example: "Het eten is klaar."
        cache:
          description: "Gebruik TTS-cache voor vaste berichten"
          example: true
      sequence:
        - alias: Spreek bericht uit met centrale TTS-instellingen
          action: tts.speak
          target:
            entity_id: tts.google_ai_tts
          data:
            media_player_entity_id: "{{ media_player_entity_id }}"
            message: "{{ message }}"
            language: nl-NL
            cache: "{{ cache | default(true) | bool }}"
            options:
              voice: Erinome

    play_tts_message:
      alias: Speel TTS-bericht af
      description: "Speel een TTS-bericht af ingesteld in de frontend"
      icon: mdi:account-voice
      mode: single
      max_exceeded: silent
      variables:
        target_map:
          Woonkamer: media_player.nest_hub_woonkamer
          Hele huis: media_player.hele_huis
          Bovenverdieping: media_player.boven
          Slaapkamer T: media_player.slaapkamer_t
          Zolder: media_player.zolder
          Kantoor: media_player.kantoor
        target: "{{ target_map[states('input_select.tts_target')] }}"
      sequence:
        - alias: Speel TTS-bericht af op gekozen doelspeler
          action: script.tts_announce
          data:
            media_player_entity_id: "{{ target }}"
            message: "{{ states('input_text.tts_message') }}"
            cache: false
        - alias: Wacht 30 seconden voordat speler wordt uitgezet
          delay: 00:00:30
        - alias: Zet doelspeler uit na TTS-bericht
          action: media_player.turn_off
          data:
            entity_id: "{{ target }}"
