system_package:
  automation:
    ##########################
    ## Set theme
    ##########################
    - id: set_theme
      alias: "Stel thema in"
      triggers:
        - alias: Home Assistant start op
          trigger: homeassistant
          event: start
        - alias: Zonhoogte stijgt boven 0 (zonsopkomst)
          trigger: numeric_state
          entity_id: sun.sun
          attribute: elevation
          above: 0
        - alias: Zonhoogte daalt onder 0 (zonsondergang)
          trigger: numeric_state
          entity_id: sun.sun
          attribute: elevation
          below: 0
      actions:
        - alias: Kies licht of donker thema op basis van zonnestand
          if:
            - condition: numeric_state
              entity_id: sun.sun
              attribute: elevation
              above: 0
          then:
            - alias: Zet thema naar Hmmbob light theme
              action: frontend.set_theme
              data:
                name: "Hmmbob light theme"
                mode: dark
          else:
            - alias: Zet thema naar Hmmbob dark theme
              action: frontend.set_theme
              data:
                name: "Hmmbob dark theme"
                mode: dark

    # Automation om de datum van het "eindveld" in de UI op dezelfde waarde in te stellen als de "startdatum"
    - id: ui_set_end_date
      alias: "Stel de datum van het eindveld op dezelfde dag in als de begindatum"
      description: "Systeem: Repareer de UI - stel datum van eindveld in op datum van begindatum"
      triggers:
        - alias: Solar PV off start-tijd wordt gewijzigd
          trigger: state
          entity_id: input_datetime.solar_pv_off_start
          variables:
            end_entity_id: input_datetime.solar_pv_off_end
      actions:
        - alias: Stel datum van gewenst eindveld in
          action: input_datetime.set_datetime
          target:
            entity_id: "{{ end_entity_id }}"
          data:
            date: "{{states(trigger.entity_id) | truncate(10, 'False', '') }}"

    ##########################
    ## System update notifications
    ##########################
    - alias: "Stuur een melding dat er een nieuwe Home Assistant versie is"
      id: system_update_available_notification
      description: Stuur melding als Home Assistant update beschikbaar is
      triggers:
        - alias: Beschikbare Home Assistant versie wordt gewijzigd
          trigger: state
          entity_id: sensor.latest_version
          not_to:
            - "unknown"
            - "unavailable"
            - "none"
      conditions:
        - alias: Controleer of latest_version afwijkt van current_version
          condition: template
          value_template: >
            {{ states('sensor.latest_version') != states('sensor.current_version') }}
      actions:
        - alias: Stuur update-notificatie
          action: notify.mobile_app_sm_a556b
          data:
            title: Moment om op te graden!
            message: >
              Er is een upgrade voor de Home Assistant container in behandeling!
              Versie {{ states('sensor.latest_version') }} is zojuist uitgebracht!
            data:
              tag: System
              channel: System
              notification_icon: mdi:cellphone-arrow-down
              actions:
                - action: "URI"
                  title: "Wijzigingslogboek openen"
                  uri: "https://github.com/home-assistant/core/releases/tag/{{states('sensor.latest_version')}}"

    ##########################
    ## Update radar
    ##########################
    - id: "1784465206043"
      alias: "Update Radar - Detecteer en herinner"
      description: >
        Inventariseert dagelijks om 19:00 dynamisch openstaande Home Assistant
        Core- en HACS-upgrades. Alleen een daadwerkelijk nieuwere, nog niet
        geanalyseerde versiecombinatie wordt als werk gemarkeerd en via de
        telefoon gemeld. Een geïnstalleerde beta of prerelease die nieuwer is
        dan het aangeboden kanaal wordt genegeerd. Deze automatisering
        installeert of wijzigt geen updates.
      triggers:
        - trigger: time
          at: "19:00:00"
      conditions: []
      actions:
        - alias: Bepaal alle openstaande Core- en HACS-versies
          variables:
            pending_items: >-
              {% set ns = namespace(items=[]) %}
              {% set hacs_updates = integration_entities('hacs') | select('match', '^update\\.') | list %}
              {% for entity_id in hacs_updates %}
                {% set installed = state_attr(entity_id, 'installed_version') %}
                {% set latest = state_attr(entity_id, 'latest_version') %}
                {% if installed not in [none, ''] and latest not in [none, '']
                      and version(installed) < version(latest) %}
                  {% set ns.items = ns.items + [entity_id ~ ':' ~ installed ~ '>' ~ latest] %}
                {% endif %}
              {% endfor %}
              {% set current = states('sensor.current_version') %}
              {% set latest_ha = states('sensor.latest_version') %}
              {% if current not in ['unknown', 'unavailable', ''] and latest_ha not in ['unknown', 'unavailable', '']
                    and version(current) < version(latest_ha) %}
                {% set ns.items = ns.items + ['home_assistant:' ~ current ~ '>' ~ latest_ha] %}
              {% endif %}
              {{ ns.items | sort }}
        - alias: Maak een stabiele vingerafdruk
          variables:
            pending_count: "{{ pending_items | count }}"
            pending_signature: "{{ sha256(pending_items | join('|')) if pending_items else 'none' }}"
        - alias: Markeer nieuw analysewerk of ruim een afgehandelde melding op
          choose:
            - conditions:
                - condition: template
                  value_template: >-
                    {{ pending_count | int > 0 and pending_signature !=
                       states('input_text.update_radar_laatst_geanalyseerde_signatuur') }}
              sequence:
                - alias: Registreer alleen een werkelijk nieuwe versiecombinatie
                  if:
                    - condition: template
                      value_template: >-
                        {{ pending_signature !=
                           states('input_text.update_radar_wachtende_signatuur') }}
                  then:
                    - action: input_text.set_value
                      target:
                        entity_id: input_text.update_radar_wachtende_signatuur
                      data:
                        value: "{{ pending_signature }}"
                    - action: counter.increment
                      target:
                        entity_id: counter.update_radar_generatie
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.update_radar_analyse_nodig
                - alias: Herinner aan de handmatige Codex-controle
                  action: notify.mobile_app_sm_a556b
                  data:
                    title: Update-impactanalyse nodig
                    message: >-
                      Er wachten {{ pending_count }} nieuwere Home Assistant/HACS-versie(s)
                      op impactanalyse. Open Codex en typ: Voer de updatecontrole uit.
                    data:
                      tag: ha-update-radar
                      notification_icon: mdi:radar
          default:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.update_radar_analyse_nodig
            - action: input_text.set_value
              target:
                entity_id: input_text.update_radar_wachtende_signatuur
              data:
                value: none
            - alias: Verwijder een oude herinnering
              action: notify.mobile_app_sm_a556b
              data:
                message: clear_notification
                data:
                  tag: ha-update-radar
      mode: single
