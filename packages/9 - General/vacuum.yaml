vacuum_package:
  input_boolean:
    vacuum_enable_ask_for_cleaning:
      name: "Stofzuiger herinnering"
      icon: mdi:robot-vacuum

  input_datetime:
    vacuum_ask_for_cleaning_time:
      name: Stofzuiger herinnering tijdstip
      has_time: true
      has_date: false

  automation:
    ##########################
    ## Schedule
    ##########################
    - alias: "Vraag welke stofzuiger moet stofzuigen"
      id: vacuum_ask_to_run
      variables:
        notification_service: >
          {% if is_state("device_tracker.sm_a566b", "home") and
            is_state("device_tracker.sm_a556b", "home") %}
              notify.mobile_devices_adults 
          {% elif is_state("device_tracker.sm_a566b", "home") %}
            notify.mobile_app_sm_a566b 
          {% elif is_state("device_tracker.sm_a556b", "home") %}
            notify.mobile_app_sm_a556b 
          {% else %}notify.bogus {% endif %}
      triggers:
        - alias: Ingestelde herinneringstijd is bereikt
          trigger: time
          at: input_datetime.vacuum_ask_for_cleaning_time
      conditions:
        - alias: Stofzuiger herinnering is ingeschakeld
          condition: state
          entity_id: input_boolean.vacuum_enable_ask_for_cleaning
          state: "on"
        - alias: Er is minimaal één volwassene thuis
          condition: state
          entity_id: group.all_adults
          state: "home"
        - alias: Vakantiemodus is uitgeschakeld
          condition: state
          entity_id: input_boolean.vacation_mode_away
          state: "off"
      actions:
        - alias: "Vraag welke stofzuiger een rondje moet doen"
          action: "{{ notification_service }}"
          data:
            message: "Wie zal er gaan stofzuigen? 🧹🧹"
            title: "Stofzuigers"
            data:
              tag: vacuum_reminder
              actions:
                - action: "vacuum_start_rocky"
                  title: "Rocky"
                - action: "vacuum_start_balboa"
                  title: "Balboa"
                - action: "vacuum_start_both"
                  title: "Beiden"
              ttl: 0
              priority: high
              notification_icon: mdi:robot-vacuum
        - alias: "Wacht op antwoord..."
          wait_for_trigger:
            - trigger: event
              event_type: mobile_app_notification_action
              event_data:
                action: "vacuum_start_rocky"
              id: rocky
            - trigger: event
              event_type: mobile_app_notification_action
              event_data:
                action: "vacuum_start_balboa"
              id: balboa
            - trigger: event
              event_type: mobile_app_notification_action
              event_data:
                action: "vacuum_start_both"
              id: both
          timeout: "01:00:00"
          continue_on_timeout: false
        - alias: Start gekozen stofzuiger(s)
          choose:
            - conditions: "{{ wait.trigger.id == 'rocky' }}"
              sequence:
                - action: vacuum.start
                  target:
                    entity_id: vacuum.rocky
            - conditions: "{{ wait.trigger.id == 'balboa' }}"
              sequence:
                - action: vacuum.start
                  target:
                    entity_id: vacuum.balboa
            - conditions: "{{ wait.trigger.id == 'both' }}"
              sequence:
                - action: vacuum.start
                  target:
                    entity_id:
                      - vacuum.rocky
                      - vacuum.balboa

    # TODO: Voeg Balboa toe zodra de eerste kaart klaar is. Laat Balboa na het
    # reinigen naar de keuken rijden met de coördinaten van de benedenverdieping.
    - alias: "Stuur Rocky naar de overloop"
      id: vacuum_drive_to_trash
      initial_state: "on"
      triggers:
        - alias: Stofzuiger is klaar met reinigen en keert terug
          trigger: state
          entity_id: vacuum.rocky
          from: "cleaning"
          to: "returning"
      actions:
        - variables:
            message: "Rocky is klaar."
        - alias: Stop stofzuiger voordat commando verzonden wordt
          action: vacuum.stop
          entity_id: vacuum.rocky
        - alias: Wacht kort voordat commando verzonden wordt
          delay: "00:00:02"
        - alias: Stuur stofzuiger naar de overloop
          action: roborock.set_vacuum_goto_position
          target:
            entity_id: vacuum.rocky
          data:
            "x": "25625"
            "y": "24922"
        - variables:
            message:
              "🧹 Hi! Ik ben klaar op de bovenverdieping en sta klaar op de
              overloop."
        - alias: "Wacht tot Rocky bij bestemming is"
          wait_for_trigger:
            - trigger: state
              entity_id: vacuum.rocky
              to: "idle"
          timeout: "00:05:00"
          continue_on_timeout: false
        - alias: Stuur notificatie dat stofzuiger geleegd moet worden
          action: notify.mobile_devices_adults
          data:
            message: "{{ message }}"
            title: "Rocky"
            data:
              tag: vacuum_rocky
              ttl: 0
              priority: high
              notification_icon: mdi:robot-vacuum

    ##########################
    ## Vacuum notifications
    ##########################
    - alias: "Melding dat een stofzuiger aan het stofzuigen is"
      id: vacuum_notification_cleaning_started
      mode: parallel
      max: 2
      initial_state: "on"
      variables:
        vacuum_name: "{{ 'Rocky' if trigger.id == 'rocky' else 'Balboa' }}"
        notification_tag: "{{ 'vacuum_rocky' if trigger.id == 'rocky' else 'vacuum_balboa' }}"
      triggers:
        - alias: Rocky start met reinigen
          trigger: state
          entity_id: vacuum.rocky
          to: "cleaning"
          id: rocky
        - alias: Balboa start met reinigen
          trigger: state
          entity_id: vacuum.balboa
          to: "cleaning"
          id: balboa
      actions:
        - alias: Stuur notificatie dat stofzuiger bezig is
          action: notify.mobile_app_sm_a556b
          data:
            title: "{{ vacuum_name }}"
            message: "{{ vacuum_name }} doet zijn rondje! 🧹🧹"
            data:
              tag: "{{ notification_tag }}"
              notification_icon: mdi:robot-vacuum

    - alias: "Verwijder notificatie als stofzuiger klaar is"
      id: vacuum_clear_messages
      mode: parallel
      max: 2
      initial_state: "on"
      variables:
        notification_tag: "{{ 'vacuum_rocky' if trigger.id == 'rocky' else 'vacuum_balboa' }}"
      triggers:
        - alias: Rocky-foutmelding is opgelost
          trigger: state
          entity_id: sensor.rocky_vacuum_error
          to: "none"
          id: rocky
        - alias: Rocky is teruggekeerd naar het dock
          trigger: state
          entity_id: vacuum.rocky
          to: "docked"
          id: rocky
        - alias: Balboa is teruggekeerd naar het dock
          trigger: state
          entity_id: vacuum.balboa
          to: "docked"
          id: balboa
        - alias: Balboa-foutmelding is opgelost
          trigger: state
          entity_id: sensor.balboa_status
          from: "error"
          id: balboa
      actions:
        - alias: Verwijder notificaties
          action: notify.mobile_devices_adults
          data:
            message: clear_notification
            data:
              tag: "{{ notification_tag }}"
              ttl: 0
              priority: high

      ##########################
      ## Capture errors
      ##########################
    # TODO: Controleer na Balboa's eerste kaart of er een eigen errorsensor is
    # toegevoegd en vervang dan de algemene statusmelding voor Balboa.
    - alias: "Melding dat een stofzuiger in foutmodus staat"
      id: vacuum_notification_error
      initial_state: "on"
      variables:
        vacuum_name: "{{ 'Rocky' if trigger.id == 'rocky' else 'Balboa' }}"
        error_message: >-
          {% if trigger.id == 'rocky' %}
            Foutmelding: {{ state_translated('sensor.rocky_vacuum_error') }}
          {% else %}
            Balboa meldt een algemene foutstatus. Controleer de Roborock-app voor details.
          {% endif %}
        notification_service: >
          {% if is_state("device_tracker.sm_a566b", "home") and
            is_state("device_tracker.sm_a556b", "home") %}
              notify.mobile_devices_adults 
          {% elif is_state("device_tracker.sm_a566b", "home") %}
            notify.mobile_app_sm_a566b 
          {% elif is_state("device_tracker.sm_a556b", "home") %}
            notify.mobile_app_sm_a556b 
          {% else %}notify.mobile_devices_adults {% endif %}
      triggers:
        - alias: Rocky-foutmelding status is gewijzigd
          trigger: state
          entity_id: sensor.rocky_vacuum_error
          id: rocky
        - alias: Balboa meldt een foutstatus
          trigger: state
          entity_id: sensor.balboa_status
          to: "error"
          id: balboa
      conditions:
        - alias: Er is een actieve foutmelding
          condition: template
          value_template: >-
            {{ trigger.id == 'balboa' or
              trigger.to_state.state not in ['none', 'unavailable', 'unknown'] }}
      actions:
        - alias: Stuur foutmelding naar beschikbare apparaten
          action: "{{ notification_service }}"
          data:
            title: "{{ vacuum_name }} heeft een probleem"
            message: "{{ error_message }}"
            data:
              tag: "{{ 'vacuum_rocky' if trigger.id == 'rocky' else 'vacuum_balboa' }}"
              ttl: 0
              priority: high
              notification_icon: mdi:robot-vacuum

    # TODO: Breid de onderhoudslogica later uit voor Balboa zodra alle sensoren
    # en eventuele resetknoppen beschikbaar zijn.
    - alias: "Waarschuw als Rocky onderhoud nodig heeft"
      id: vacuum_consumable_warning
      initial_state: "on"
      mode: queued
      variables:
        consumables:
          - sensor: sensor.rocky_filter_time_left
            button: button.rocky_reset_air_filter_consumable
            name: "filter"
          - sensor: sensor.rocky_main_brush_time_left
            button: button.rocky_reset_main_brush_consumable
            name: "hoofd borstel"
          - sensor: sensor.rocky_sensor_time_left
            button: button.rocky_reset_sensor_consumable
            name: "sensor"
          - sensor: sensor.rocky_side_brush_time_left
            button: button.rocky_reset_side_brush_consumable
            name: "zijborstel"
      trigger:
        - alias: Resterende levensduur onderdeel is onder nul
          platform: numeric_state
          entity_id:
            - sensor.rocky_filter_time_left
            - sensor.rocky_main_brush_time_left
            - sensor.rocky_sensor_time_left
            - sensor.rocky_side_brush_time_left
          below: 0
      action:
        - alias: Bepaal welk onderdeel onderhoud nodig heeft
          variables:
            triggered_sensor: "{{ trigger.entity_id }}"
            consumable: >-
              {{ consumables | selectattr('sensor', 'eq', triggered_sensor) |
              list | first }}
        - alias: "Stuur notificatie: Rocky onderhoud nodig"
          service: notify.mobile_app_sm_a556b
          data:
            title: "Rocky onderhoud nodig"
            message:
              "De {{ consumable.name }} van Rocky moet worden vervangen of
              schoongemaakt. Wil je de teller resetten?"
            data:
              tag: rocky_maintenance
              notification_icon: mdi:robot-vacuum
              actions:
                - action: "reset_consumable"
                  title: "Reset teller"
                - action: "ignore"
                  title: "Later"
              ttl: 0
              priority: high
        - alias: Wacht op antwoord via notificatie
          wait_for_trigger:
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "reset_consumable"
          timeout: "01:00:00"
          continue_on_timeout: false
        - alias: Voer actie uit op basis van gebruikersantwoord
          choose:
            - conditions: "{{ wait.trigger is not none }}"
              sequence:
                - alias: Reset onderhoudsteller van onderdeel
                  service: button.press
                  target:
                    entity_id: "{{ consumable.button }}"
            - conditions: "{{ wait.trigger is none }}"
              sequence:
                - alias: Maak blijvende notificatie voor niet-gereset onderdeel
                  service: persistent_notification.create
                  data:
                    title: "Rocky onderhoud niet gereset"
                    message:
                      "De {{ consumable.name }} teller is niet gereset. Vergeet het niet als
                      je onderhoud hebt gedaan!"
                    notification_id: "rocky_maintenance_{{ consumable.name }}"
