postcodeloterij_package:
  automation:
    - id: postcodeloterij_notify_when_prize_won
      alias: "Postcodeloterij: Prijs"
      description: >
        Stuur een notificatie met de prijsafbeelding wanneer de
        Postcodeloterij-sensor voor een nieuwe trekking een prijs meldt.
      triggers:
        - trigger: state
          entity_id: sensor.postcodeloterij_thuis_prijzen
      conditions:
        - condition: numeric_state
          entity_id: sensor.postcodeloterij_thuis_prijzen
          above: 0
        - condition: template
          value_template: >
            {{
              trigger.from_state is not none
              and trigger.from_state.state not in ['unknown', 'unavailable']
              and (
                trigger.from_state.state != trigger.to_state.state
                or trigger.from_state.attributes.get('period')
                  != trigger.to_state.attributes.get('period')
              )
            }}
      actions:
        - action: notify.mobile_devices_adults
          data:
            title: "🎁 Winnen doe je bij..."
            message: >
              {{ state_attr('sensor.postcodeloterij_thuis_prijzen', 'prize_description') }}
            data:
              clickAction: >
                {{ state_attr('sensor.postcodeloterij_thuis_prijzen', 'prize_more_info_url') }}
              image: >
                {{ state_attr('sensor.postcodeloterij_thuis_prijzen', 'prize_img_url') }}
              channel: LotteryPrize
              ttl: 0
              priority: high
              notification_icon: mdi:gift
              tag: LotteryPrize
      mode: single
