morning_briefing_package:
  ##########################
  ## Sends a morning briefing message to my phone
  ##########################
  input_datetime:
    time_morning_briefing:
      name: Start morning briefing
      has_time: true

  automation:
    - id: morning_briefing
      alias: "Verstuur ochtendbriefing"
      description: "Notifications: Morning briefing"
      triggers:
        alias: Trigger op de ingestelde tijd
        trigger: time
        at: input_datetime.time_morning_briefing
      conditions:
        - alias: Voorwaarde vakantiemodus afwezig is uit
          condition: state
          entity_id: input_boolean.vacation_mode_away
          state: "off"
      actions:
        - alias: Haal NL Weather dagverwachting op
          action: weather.get_forecasts
          target:
            entity_id: weather.verwachtingen
          data:
            type: daily
          response_variable: weather_forecast
        - alias: Genereer ochtendbriefing
          action: ai_task.generate_data
          response_variable: response
          data:
            entity_id: ai_task.google_ai_task
            task_name: Ochtendbriefing
            instructions: |
              {% set forecast = weather_forecast['weather.verwachtingen'].forecast[0] %}
              Write a concise and friendly morning briefing in Dutch (plain text only, no markdown, no bold, no headers) that includes:
              - The time the sun rises today: {{ states('sensor.sun_next_rising') | as_datetime | as_timestamp | timestamp_custom('%H:%M', True) }}
              - The maximum temperature expected today: {{ states('sensor.weer_thuis_vandaag_maximum', with_unit=True) }}
              - The current outdoor temperature and weather condition: {{ states('sensor.weer_thuis_temperatuur', with_unit=True) }} and {{ states('weather.weer_thuis_waarnemingen') }}
              - A brief weather forecast for today: {{ forecast.condition }}, high {{ forecast.temperature }} C, low {{ forecast.templow }} C, {{ forecast.precipitation_probability }}% chance of precipitation and {{ forecast.precipitation }} mm precipitation expected.
        - alias: Stuur ochtendmelding
          action: notify.mobile_app_sm_a556b
          data:
            title: Good morning sunshine!
            message: "{{ response.data }}"
            data:
              tag: "morning-brief"
              notification_icon: mdi:weather-sunset-up
