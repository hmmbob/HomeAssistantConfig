####################
# Start page       #
####################
path: start
title: Start
icon: mdi:home-assistant
cards:
  - type: vertical-stack
    cards:
      - type: horizontal-stack
        uix:
          style:
            .: |
              ha-card {
                box-shadow: none;
              }
        cards:
          - type: markdown
            uix:
              style:
                .: |
                  ha-card {
                    box-shadow: none;
                    --ha-card-background: rgba(0, 0, 0, 0.0)
                  }
                ha-markdown$: |
                  h1 {
                      font-size: 18px !important;
                      font-weight: 400 !important;
                      color: var(--app-header-text-color);
                    }
            content: |
              {% if now().hour < 5 %}
              # Goede nacht, {{user}}!
              {% elif now().hour < 12 %}
              # Goede morgen, {{user}}!
              {% elif now().hour < 18 %}
              # Goede middag, {{user}}!
              {% else %}
              # Fijne avond, {{user}}!
              {% endif %}
          - type: custom:mushroom-chips-card
            uix:
              style: |
                ha-card {
                  margin: 9px 0px 0px 0px;
                }
            alignment: end
            chips:
              - type: conditional
                conditions:
                  - entity: input_boolean.pakketbrievenbus_bevat_pakket
                    state: "on"
                chip:
                  type: template
                  entity: counter.pakketbrievenbus_pakketten_aanwezig
                  icon: mdi:package-variant-closed
                  icon_color: green
                  content: >-
                    {{ states(entity) }}
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: Pakketbrievenbus
                        content: !include common/pakketbrievenbus-card.yaml
              - type: weather
                entity: weather.verwachtingen
                show_conditions: true
                show_temperature: true
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      timeout: 20000
                      content: !include common/weather-popup.yaml

      - type: custom:mushroom-chips-card
        alignment: justify
        chips:
          - type: entity
            entity: person.bob
            use_entity_picture: true
          - type: entity
            entity: !secret person_mw
            use_entity_picture: true
          - type: entity
            entity: !secret person_puber
            use_entity_picture: true
          - type: entity
            entity: !secret person_mini
            use_entity_picture: true

      - !include common/weather-warning-card.yaml

      ###########################
      # UIX Forge room cards    #
      ###########################
      - type: horizontal-stack
        cards:
          - type: custom:uix-forge
            forge:
              mold: card
              grid_options:
                rows: auto
              sparks:
                - type: button
                  after: "mushroom-template-card $ ha-tile-info"
                  icon: >-
                    {{ "mdi:lightbulb-group" if is_state('light.verlichting_woonkamer', 'on') else "mdi:lightbulb-group-outline" }}
                  entity: light.verlichting_woonkamer
                  color: >-
                    {{ "var(--orange-color)" if is_state('light.verlichting_woonkamer', 'on') else "var(--grey-color)" }}
                  tap_action:
                    action: perform-action
                    perform_action: light.toggle
                    data: {}
                    target:
                      entity_id: light.verlichting_woonkamer
                - type: button
                  after: >-
                    mushroom-template-card $
                    div[data-uix-forge-button-id]
                  icon: "{{states('sensor.template_airco_woonkamer_icon')}}"
                  entity: climate.airco_woonkamer
                  color: >-
                    {% set c = state_attr('sensor.template_airco_woonkamer_icon', 'color') %}
                    {% set colors = {'blue': 'var(--blue-color)', 'green': 'var(--green-color)', 'grey': 'var(--grey-color)', 'gray': 'var(--grey-color)', 'orange': 'var(--orange-color)', 'red': 'var(--red-color)', 'amber': 'var(--amber-color)', 'yellow': 'var(--yellow-color)'} %}
                    {{ colors.get(c, c or 'var(--grey-color)') }}
                  tap_action:
                    action: more-info
                - type: button
                  after: >-
                    mushroom-template-card $
                    div[data-uix-forge-button-id]:nth-of-type(2)
                  icon: phu:rituals
                  entity: switch.genie
                  color: >-
                    {{ "var(--green-color)" if is_state('switch.genie', 'on') else "var(--grey-color)" }}
                  tap_action:
                    action: perform-action
                    perform_action: switch.toggle
                    data: {}
                    target:
                      entity_id: switch.genie
                - type: button
                  after: >-
                    mushroom-template-card $
                    div[data-uix-forge-button-id]:nth-of-type(3)
                  icon: none
                  color: transparent
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/woonkamer
            element:
              type: custom:mushroom-template-card
              icon: mdi:sofa-outline
              icon_color: green
              primary: Woonkamer
              secondary: "{{ states('sensor.temp_sensor_7_woonkamer_temperatuur') | round(1, default=0) }} \u00B0C"
              layout: horizontal
              tap_action:
                action: navigate
                navigation_path: /lovelace/living-room
              uix:
                style:
                  ha-tile-icon$: |
                    .container {
                      width: 140px !important;
                      height: 140px !important;
                      background: rgba(128, 199, 149, 0.2) !important;
                    }
                  .: |
                    ha-card {
                      height: 225px !important;
                      overflow: hidden;
                      background: var(--ha-card-background, var(--card-background-color, #202124));
                      position: relative;
                    }
                    :host {
                      --mush-icon-size: 140px;
                    }
                    ha-tile-info {
                      position: absolute !important;
                      top: 16px;
                      left: 10px;
                      width: calc(100% - 88px);
                      z-index: 2;
                    }
                    ha-tile-icon:not([data-uix-forge-tile-icon-id]) {
                      position: absolute !important;
                      left: -16px;
                      top: 112px;
                      width: 140px !important;
                      height: 140px !important;
                    }
                    ha-tile-icon:not([data-uix-forge-tile-icon-id]) > ha-state-icon {
                      width: 92px !important;
                      height: 92px !important;
                      --mdc-icon-size: 92px;
                      color: rgb(128, 199, 149) !important;
                      position: relative;
                      z-index: 1;
                    }
                    div[data-uix-forge-button-id] {
                      pointer-events: auto;
                    }
                    div[data-uix-forge-button-id] > ha-button.uix-forge-spark-icon-button {
                      position: absolute !important;
                      right: 22px;
                      z-index: 3;
                      width: 40px;
                      height: 40px;
                      min-width: 40px;
                      margin: 0 !important;
                      border-radius: 50%;
                      background: color-mix(in srgb, currentColor 20%, transparent);
                      --mdc-icon-size: 27px;
                    }
                    div[data-uix-forge-button-id] > ha-button.uix-forge-spark-icon-button ha-icon.uix-button-icon {
                      transform: translate(-4px, -4.5px);
                    }
                    div[data-uix-forge-button-id]:nth-of-type(1) > ha-button.uix-forge-spark-icon-button {
                      top: 14px;
                    }
                    div[data-uix-forge-button-id]:nth-of-type(2) > ha-button.uix-forge-spark-icon-button {
                      top: 68px;
                    }
                    div[data-uix-forge-button-id]:nth-of-type(3) > ha-button.uix-forge-spark-icon-button {
                      top: 122px;
                    }
                    div[data-uix-forge-button-id]:nth-of-type(4) > ha-button.uix-forge-spark-icon-button {
                      top: 176px;
                      opacity: 0;
                    }
