####################
# Start page       #
####################
path: start
title: Start
icon: mdi:home-assistant
cards:
  - type: vertical-stack
    cards:
      - type: horizontal-stack
        uix:
          style:
            .: |
              ha-card {
                box-shadow: none;
              }
        cards:
          - type: markdown
            uix:
              style:
                .: |
                  ha-card {
                    box-shadow: none;
                    --ha-card-background: rgba(0, 0, 0, 0.0)
                  }
                ha-markdown$: |
                  h1 {
                      font-size: 18px !important;
                      font-weight: 400 !important;
                      color: var(--app-header-text-color);
                    }
            content: |
              {% if now().hour < 5 %}
              # Goede nacht, {{user}}!
              {% elif now().hour < 12 %}
              # Goede morgen, {{user}}!
              {% elif now().hour < 18 %}
              # Goede middag, {{user}}!
              {% else %}
              # Fijne avond, {{user}}!
              {% endif %}
          - type: custom:mushroom-chips-card
            uix:
              style: |
                ha-card {
                  margin: 9px 0px 0px 0px;
                }
            alignment: end
            chips:
              - type: conditional
                conditions:
                  - entity: input_boolean.pakketbrievenbus_bevat_pakket
                    state: "on"
                chip:
                  type: template
                  entity: counter.pakketbrievenbus_pakketten_aanwezig
                  icon: mdi:package-variant-closed
                  icon_color: green
                  content: >-
                    {{ states(entity) }}
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: Pakketbrievenbus
                        content: !include common/pakketbrievenbus-card.yaml
              - type: weather
                entity: weather.verwachtingen
                show_conditions: true
                show_temperature: true
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      timeout: 20000
                      content: !include common/weather-popup.yaml

      - type: custom:mushroom-chips-card
        alignment: justify
        chips:
          - type: entity
            entity: person.bob
            use_entity_picture: true
          - type: entity
            entity: !secret person_mw
            use_entity_picture: true
          - type: entity
            entity: !secret person_puber
            use_entity_picture: true
          - type: entity
            entity: !secret person_mini
            use_entity_picture: true

      - !include common/weather-warning-card.yaml

      ###########################
      # UIX Forge room cards    #
      ###########################
      - type: grid
        columns: 2
        square: false
        cards:
              - type: custom:uix-forge
                foundry: room_card_climate
                forge:
                  billets:
                    room_name: Woonkamer
                    room_icon: mdi:sofa-outline
                    room_accent_color: "rgb(128, 199, 149)"
                    temperature_entity: sensor.temp_sensor_7_woonkamer_temperatuur
                    navigation_path: /lovelace/living-room
                    climate_entity: climate.airco_woonkamer
                    climate_icon_entity: sensor.template_airco_woonkamer_icon
                    slot_4_hidden: true
                  sparks:
                    - type: button
                      id: slot_1
                      icon: >-
                        {{ "mdi:lightbulb-group" if is_state('light.verlichting_woonkamer', 'on') else "mdi:lightbulb-group-outline" }}
                      entity: light.verlichting_woonkamer
                      color: >-
                        {{ "var(--orange-color)" if is_state('light.verlichting_woonkamer', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle
                    - type: button
                      id: slot_3
                      icon: phu:rituals
                      entity: switch.genie
                      color: >-
                        {{ "var(--green-color)" if is_state('switch.genie', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle

              - type: custom:uix-forge
                foundry: room_card_climate
                forge:
                  billets:
                    room_name: Eetkamer
                    room_icon: mdi:silverware-variant
                    room_accent_color: "rgb(255, 167, 38)"
                    temperature_entity: sensor.temp_sensor_7_woonkamer_temperatuur
                    navigation_path: /lovelace/dining-room
                    climate_entity: climate.airco_woonkamer
                    climate_icon_entity: sensor.template_airco_woonkamer_icon
                    slot_3_hidden: true
                    slot_4_hidden: true
                  sparks:
                    - type: button
                      id: slot_1
                      icon: >-
                        {{ "mdi:lightbulb-group" if is_state('light.verlichting_eetkamer', 'on') else "mdi:lightbulb-group-outline" }}
                      entity: light.verlichting_eetkamer
                      color: >-
                        {{ "var(--orange-color)" if is_state('light.verlichting_eetkamer', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle

              - type: custom:uix-forge
                foundry: room_card
                forge:
                  billets:
                    room_name: Salon
                    room_icon: mdi:sofa
                    room_accent_color: "rgb(219, 148, 228)"
                    temperature_entity: sensor.salon_temperatuur
                    navigation_path: /lovelace/salon
                    slot_4_hidden: true
                  sparks:
                    - type: button
                      id: slot_1
                      icon: >-
                        {{ "mdi:lightbulb-group" if is_state('light.alle_lampen_salon', 'on') else "mdi:lightbulb-group-outline" }}
                      entity: light.alle_lampen_salon
                      color: >-
                        {{ "var(--orange-color)" if is_state('light.alle_lampen_salon', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle
                    - type: button
                      id: slot_2
                      icon: mdi:radiator
                      entity: climate.salon
                      color: >-
                        {{ "var(--orange-color)" if is_state('climate.salon', 'heat') else "var(--grey-color)" }}
                      tap_action:
                        action: more-info
                    - type: button
                      id: slot_3
                      icon: mdi:heat-wave
                      entity: climate.kacheltje
                      color: >-
                        {{ "var(--orange-color)" if states('climate.kacheltje') in ['heat', 'auto'] else "var(--grey-color)" }}
                      tap_action:
                        action: more-info
              - type: custom:uix-forge
                foundry: room_card_climate
                forge:
                  billets:
                    room_name: Master bedroom
                    room_icon: mdi:bed-king-outline
                    room_accent_color: "rgb(229, 115, 115)"
                    temperature_entity: sensor.xiaomi_temperature_humidity_sensor_5_temperature
                    navigation_path: /lovelace/mbr
                    climate_entity: climate.airco_master_bedroom
                    climate_icon_entity: sensor.template_airco_mbr_icon
                    slot_1_animation: illumination
                    slot_1_animation_entity: switch.inloopkast
                    slot_3_hidden: true
                    slot_4_hidden: true
                  sparks:
                    - type: button
                      id: slot_1
                      icon: >-
                        {{ "mdi:lightbulb-on" if is_state('switch.inloopkast', 'on') else "mdi:lightbulb-outline" }}
                      entity: switch.inloopkast
                      color: >-
                        {{ "var(--amber-color)" if is_state('switch.inloopkast', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle

              - type: custom:uix-forge
                foundry: room_card_climate
                forge:
                  billets:
                    room_name: Slaapkamer M
                    room_icon: mdi:bed-queen
                    room_accent_color: "rgb(27, 94, 32)"
                    temperature_entity: sensor.temp_sensor_8_slaapkamer_m_temperatuur
                    navigation_path: /lovelace/bed-room-maxi
                    climate_entity: climate.airco_slaapkamer_m
                    climate_icon_entity: sensor.template_airco_slaapkamer_m_icon
                    slot_1_animation: illumination
                    slot_1_animation_entity: light.verlichting_pubercave
                    slot_3_animation: boing
                    slot_3_animation_entity: binary_sensor.is_pubercave_pc_on
                    slot_4_animation: boing
                    slot_4_animation_entity: binary_sensor.is_pubercave_tv_on
                  sparks:
                    - type: button
                      id: slot_1
                      icon: >-
                        {{ "mdi:led-strip-variant" if is_state('light.verlichting_pubercave', 'on') else "mdi:led-strip-variant-off" }}
                      entity: light.verlichting_pubercave
                      color: >-
                        {{ "var(--orange-color)" if is_state('light.verlichting_pubercave', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle
                    - type: button
                      id: slot_3
                      icon: mdi:desktop-classic
                      entity: binary_sensor.is_pubercave_pc_on
                      color: >-
                        {{ "var(--green-color)" if is_state('binary_sensor.is_pubercave_pc_on', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: more-info
                    - type: button
                      id: slot_4
                      icon: mdi:television
                      entity: binary_sensor.is_pubercave_tv_on
                      color: >-
                        {{ "var(--green-color)" if is_state('binary_sensor.is_pubercave_tv_on', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: fire-dom-event
                        browser_mod:
                          service: browser_mod.popup
                          data:
                            title: TV Puber
                            content:
                              type: vertical-stack
                              cards:
                                - type: custom:mushroom-legacy-template-card
                                  primary: "TV staat {{ state_translated('binary_sensor.is_pubercave_tv_on') | lower }}"
                                  secondary: "Vandaag: {{ ((states('sensor.pubercave_tv_on_today') | float(0)) * 3600) | timestamp_custom('%-Hu%M', false) }}"
                                  entity: binary_sensor.is_pubercave_tv_on
                                  icon: "{{ 'mdi:television' if is_state('binary_sensor.is_pubercave_tv_on', 'on') else 'mdi:television-off' }}"
                                  icon_color: >-
                                    {{ "green" if is_state('binary_sensor.is_pubercave_tv_on', 'on') else "grey" }}
                                  tap_action:
                                    action: more-info
                                - type: custom:mini-media-player
                                  entity: media_player.slaapkamer_m_tv
                                  icon: mdi:cast
                                  artwork: cover
                                  artwork_border: true
                                  power_color: true
                                  scroll_info: true
                                  show_source: true
                      hold_action:
                        action: more-info

              - type: custom:uix-forge
                foundry: room_card_climate
                forge:
                  billets:
                    room_name: Slaapkamer T
                    room_icon: mdi:bed
                    room_accent_color: "rgb(33, 150, 243)"
                    temperature_entity: sensor.xiaomi_temperature_humidity_sensor_3_temperature
                    navigation_path: /lovelace/bed-room-mini
                    climate_entity: climate.airco_slaapkamer_t
                    climate_icon_entity: sensor.template_airco_slaapkamer_t_icon
                    slot_1_animation: illumination
                    slot_1_animation_entity: light.ledstrip_bureau_mini
                    slot_3_animation: boing
                    slot_3_animation_entity: binary_sensor.minicave_pc
                    slot_4_animation: boing
                    slot_4_animation_entity: binary_sensor.minicave_tv
                  sparks:
                    - type: button
                      id: slot_1
                      icon: >-
                        {{ "mdi:led-strip-variant" if is_state('light.ledstrip_bureau_mini', 'on') else "mdi:led-strip-variant-off" }}
                      entity: light.verlichting_minicave
                      color: >-
                        {% set rgb = state_attr('light.ledstrip_bureau_mini', 'rgb_color') or [128, 128, 128] %}
                        {{ "rgb(" ~ rgb[0] ~ ", " ~ rgb[1] ~ ", " ~ rgb[2] ~ ")" if is_state('light.ledstrip_bureau_mini', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle
                    - type: button
                      id: slot_3
                      icon: mdi:desktop-classic
                      entity: binary_sensor.minicave_pc
                      color: >-
                        {{ "var(--green-color)" if is_state('binary_sensor.minicave_pc', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: more-info
                    - type: button
                      id: slot_4
                      icon: mdi:television
                      entity: binary_sensor.minicave_tv
                      color: >-
                        {{ "var(--green-color)" if is_state('binary_sensor.minicave_tv', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: fire-dom-event
                        browser_mod:
                          service: browser_mod.popup
                          data:
                            title: TV Mini
                            content:
                              type: custom:mini-media-player
                              entity: media_player.tv_t
                              icon: mdi:cast
                              artwork: cover
                              artwork_border: true
                              power_color: true
                              scroll_info: true
                              show_source: true
                      hold_action:
                        action: more-info

              - type: custom:uix-forge
                foundry: room_card
                forge:
                  billets:
                    room_name: Kantoor
                    room_icon: mdi:desk
                    room_accent_color: "rgb(63, 81, 181)"
                    temperature_entity: sensor.temp_sensor_6_kantoor_temperatuur
                    navigation_path: /lovelace/office
                    slot_1_hidden: true
                  sparks:
                    - type: button
                      id: slot_2
                      icon: mdi:radiator
                      entity: climate.kantoor
                      color: >-
                        {{ "var(--orange-color)" if is_state('climate.kantoor', 'heat') else "var(--grey-color)" }}
                      tap_action:
                        action: more-info
                    - type: button
                      id: slot_3
                      icon: >-
                        {{ "mdi:printer-3d" if is_state('switch.3d_printer', 'on') else "mdi:printer-3d-off" }}
                      entity: switch.3d_printer
                      color: >-
                        {{ "var(--green-color)" if is_state('switch.3d_printer', 'on') else "var(--red-color)" }}
                      tap_action:
                        action: toggle
                        confirmation:
                          text: Weet je zeker dat je de 3D printer aan of uit wil zetten?
                    - type: button
                      id: slot_4
                      icon: phu:bambu-lab-alt
                      color: >-
                        {% set status = states('sensor.p2s_22e8bj630504658_printstatus') %}
                        {{ 'var(--green-color)' if status in ['finish', 'idle'] else
                            'var(--red-color)' if status in ['running', 'prepare', 'slicing', 'pause', 'init', 'failed'] else
                            'var(--grey-color)' }}
                      tap_action:
                        action: navigate
                        navigation_path: /lovelace/office

              - type: custom:uix-forge
                foundry: room_card
                forge:
                  billets:
                    room_name: Overig
                    room_icon: mdi:cog
                    room_accent_color: "rgb(255, 238, 88)"
                    navigation_path: /lovelace/other
                    slot_3_animation: fan
                    slot_3_animation_entity: fan.open_air_mini
                    slot_4_hidden: true
                  sparks:
                    - type: button
                      id: slot_1
                      icon: mdi:shower
                      entity: light.badkamer
                      color: >-
                        {{ "var(--orange-color)" if is_state('light.badkamer', 'on') else "var(--grey-color)" }}
                      tap_action:
                        action: toggle
                    - type: button
                      id: slot_2
                      icon: mdi:account-voice
                      color: var(--grey-color)
                      tap_action: !include common/tap-action-tts-announcement.yaml
                    - type: button
                      id: slot_3
                      icon: mdi:fan
                      entity: fan.open_air_mini
                      color: >-
                        {{ "var(--green-color)" if is_state('fan.open_air_mini', 'on') else "var(--grey-color)" }}
                      tap_action: !include common/tap-action-fan.yaml
