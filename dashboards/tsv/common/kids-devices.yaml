type: horizontal-stack
cards:
  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: tile-icon
          after: "mushroom-template-card $ ha-tile-info"
          icon: mdi:television-play
          color: >-
            {{ "green" if is_state('binary_sensor.is_pubercave_tv_on','on') else "grey" }}
    element:
      type: custom:mushroom-template-card
      primary: "{{states('input_text.naam_puber')}}"
      secondary: >-
        {{ ((states('sensor.pubercave_pc_on_today') | float(0)) * 3600) | timestamp_custom('%-Hu%M', false) }}
         - {{ ((states('sensor.pubercave_tv_on_today') | float(0)) * 3600) | timestamp_custom('%-Hu%M', false) }}
      entity: binary_sensor.is_pubercave_pc_on
      icon: mdi:desktop-classic
      icon_color: >-
        {{ "green" if is_state('binary_sensor.is_pubercave_pc_on','on') else "grey" }}
      tap_action:
        action: none
      uix:
        style:
          ha-tile-info$: |
            .primary {
              margin-left: 15px;
            }
          .: |
            ha-card {
              height: 55px !important;
            }
            ha-tile-icon:not([data-uix-forge-tile-icon-id]) > ha-state-icon {
              {% if is_state('binary_sensor.is_pubercave_pc_on', 'on') %}
              animation: boing 3s ease infinite;
              transform-origin: 50% 90%;
              {% endif %}
            }
            ha-tile-icon[data-uix-forge-tile-icon-id] {
              position: absolute !important;
              right: 8px;
              top: 9px;
              {% if is_state('binary_sensor.is_pubercave_tv_on', 'on') %}
              animation: boing 3s ease infinite;
              transform-origin: 50% 90%;
              {% endif %}
            }

  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: tile-icon
          after: "mushroom-template-card $ ha-tile-info"
          icon: mdi:television-play
          color: >-
            {{ "green" if is_state('binary_sensor.minicave_tv', 'on') else "grey" }}
    element:
      type: custom:mushroom-template-card
      primary: "{{states('input_text.naam_mini')}}"
      secondary: >-
        {{ ((states('sensor.minicave_pc_on_today') | float(0)) * 3600) | timestamp_custom('%-Hu%M', false) }}
         - {{ ((states('sensor.minicave_tv_on_today') | float(0)) * 3600) | timestamp_custom('%-Hu%M', false) }}
      entity: binary_sensor.minicave_pc
      icon: mdi:desktop-classic
      icon_color: >-
        {{ "green" if is_state('binary_sensor.minicave_pc','on') else "grey" }}
      tap_action:
        action: none
      uix:
        style:
          ha-tile-info$: |
            .primary {
              margin-left: 12px;
            }
          .: |
            ha-card {
              height: 55px !important;
            }
            ha-tile-icon:not([data-uix-forge-tile-icon-id]) > ha-state-icon {
              {% if is_state('binary_sensor.minicave_pc', 'on') %}
              animation: boing 3s ease infinite;
              transform-origin: 50% 90%;
              {% endif %}
            }
            ha-tile-icon[data-uix-forge-tile-icon-id] {
              position: absolute !important;
              right: 8px;
              top: 9px;
              {% if is_state('binary_sensor.minicave_tv', 'on') %}
              animation: boing 3s ease infinite;
              transform-origin: 50% 90%;
              {% endif %}
            }
