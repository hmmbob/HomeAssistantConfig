title: TSV 2
path: tsv2
theme: Hmmbob dark theme
type: custom:vertical-layout
layout:
  width: 500

cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - !include common/weather-card.yaml
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: end
            chips:
              - !include common/chip-pakketbrievenbus.yaml
              - !include common/chip-temp.yaml

              - type: entity
                entity: sensor.temp_sensor_6_kantoor_temperatuur
                icon: mdi:home-thermometer
                tap_action:
                  action: none
                uix:
                  style: |
                    ha-card {
                      --chip-background: transparent;
                      --chip-border-color: transparent;
                      --chip-box-shadow: none;
                    }

              - !include common/chip-fan.yaml
              - !include common/chip-cctv.yaml
              - !include common/chip-omroep.yaml
          - !include ../common/weather-warning-card.yaml

  - type: grid
    columns: 2
    square: false
    cards:
      - type: vertical-stack
        cards:
          - !include common/button-lights.yaml
          - !include common/kids-devices.yaml

          - type: custom:uix-forge
            forge:
              mold: card
              sparks:
                - type: button
                  after: "mushroom-media-player-card $ mushroom-state-info"
                  icon: phu:radio-538
                  color: deep-purple
                  tap_action:
                    action: perform-action
                    perform_action: media_player.play_media
                    target:
                      entity_id: media_player.kantoor
                    data:
                      media_content_id: https://playerservices.streamtheworld.com/api/livestream-redirect/RADIO538.mp3
                      media_content_type: music
            element:
              type: custom:mushroom-media-player-card
              entity: media_player.kantoor
              media_controls:
                - on_off
                - previous
                - play_pause_stop
                - next
              volume_controls:
                - volume_mute
                - volume_set
                - volume_buttons
              collapsible_controls: true
              layout: horizontal
              show_volume_level: true
              use_media_info: true
              tap_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.sequence
                  data:
                    sequence:
                      - service: browser_mod.more_info
                        data:
                          entity: media_player.kantoor
                      - service: browser_mod.delay
                        data:
                          time: 10000
                      - service: browser_mod.more_info
              uix:
                style: |
                  mushroom-state-item {
                    position: relative;
                  }
                  ha-button.uix-forge-spark-icon-button {
                    color: var(--deep-purple-color);
                    position: absolute !important;
                    right: 16px;
                    top: 3px;
                    {% if not is_state('media_player.kantoor', 'off') %}
                    display: none !important;
                    {% endif %}
                  }
                  ha-button.uix-forge-spark-icon-button ha-icon.uix-button-icon {
                    --mdc-icon-size: 34px;
                  }

          - !include ../common/3d-printer.yaml

      ### Right column
      - type: custom:calendar-card-pro
        entities:
          - entity: calendar.bl
            accent_color: "#0911e8"
            blocklist: "restafval|gft|plasticinzameling"
          - entity: calendar.bv
            accent_color: "#f266eb"
          - entity: calendar.m
            accent_color: "#8607f5"
          - entity: calendar.t
            accent_color: "#20572f"
          - entity: calendar.familie
            accent_color: "#d98b04"
            allowlist: "verjaardag|trouwdag" # Celebration events
            label: "🎉" # Add celebration label to these events
          - entity: calendar.familie
            accent_color: "#d98b04"
            allowlist: "Picnic|Jumbo" # Grocery delivery events
            label: "🛒" # Add shopping cart
          - entity: calendar.familie
            accent_color: "#f266eb" # Apply pinks color to wife's work schedule
            allowlist: "B[a-zA-Z]{5}\\s(vrij|werken)"
          - entity: calendar.familie
            accent_color: "#d98b04" # Exclude everything included above
            blocklist: "tafel dekken|vakantie|verjaardag|trouwdag|B[a-zA-Z]{5}\\s(vrij|werken)|Picnic"
        date_vertical_alignment: top
        day_font_size: "24px"
        day_separator_color: "#03a9f430"
        day_separator_width: "1px"
        days_to_show: 2
        event_background_opacity: 40
        event_font_size: "13px"
        event_spacing: 6px
        filter_duplicates: true
        first_day_of_week: monday
        refresh_interval: 10
        show_location: false
        show_single_allday_time: false
        split_multiday_events: true
        today_indicator: glow
        today_indicator_position: "7px 27px"
        vertical_line_width: 5px
        uix: # Show time inline
          style: |
            div.event-content {
              display: grid;
              grid-template-areas: 
                "title time"
                "location location";
              grid-template-columns: 1fr auto;
              column-gap: 10px;
              row-gap: 0px;
            }
            div.summary {
              grid-area: title;
              overflow: hidden;
              text-overflow: ellipsis;
            }
            div.time {
              grid-area: time;
              white-space: nowrap;
            }
            div.location {
              grid-area: location;
              white-space: normal;
              overflow: hidden;
              text-overflow: ellipsis;
            }
            div.time-location {
              display: contents;
            }
        tap_action:
          action: navigate
          navigation_path: /tsv-dashboards/calendar
