####################
# Office           #
####################
path: office
title: Kantoor
icon: mdi:chair-school
visible: false
cards:
  - type: vertical-stack
    cards:
      - type: custom:mushroom-title-card
        title: Kantoor
        alignment: justify
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            tap_action:
              action: navigate
              navigation_path: /lovelace/start
            icon: mdi:arrow-left
          - type: entity
            entity: sensor.temp_sensor_6_kantoor_temperatuur
            icon_color: orange
          - type: entity
            entity: sensor.temp_sensor_6_kantoor_luchtvochtigheid
            icon_color: indigo
          - type: template
            entity: plant.dracaena
            icon: mdi:sprout-outline
            icon_color: |-
              {{ "green" if is_state('plant.dracaena', 'ok') else "red" }}
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Dracaena
                  content:
                    type: custom:flower-card
                    entity: plant.dracaena
                    battery_sensor: sensor.xiaomi_plant_sensor_1_battery
                    show_bars:
                      - moisture
                      - conductivity
                      - temperature
                      - illuminance

      - type: custom:mushroom-template-card
        primary: Verwarming kantoor
        secondary: >-
          {{ state_translated('climate.kantoor') }} - 
          Ingesteld op {{ state_attr('climate.kantoor','temperature') }} °C, 
          momenteel {{ states('sensor.kantoor_temperatuur') |round(1, default=0) }} °C
        icon: phu:tado
        icon_color: |-
          {{ "green" if is_state(entity, 'auto') else "orange" if is_state(entity, 'heat') else "grey" }}
        entity: climate.kantoor
        visibility:
          - condition: user
            users:
              - 40059eb4e4d142688185485ed2e1ebbb
              - 510b1afef60640d7a220711c50b2192a

      - type: custom:mini-media-player
        entity: media_player.kantoor
        icon: phu:google-home
        artwork: cover
        artwork_border: true
        power_color: true
        scroll_info: true
        show_source: true
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: "Speel Radio538"
            icon_color: deep-purple
            icon: phu:radio-538
            tap_action:
              action: perform-action
              perform_action: media_player.play_media
              target:
                entity_id: media_player.kantoor
              data:
                media_content_id: https://playerservices.streamtheworld.com/api/livestream-redirect/RADIO538.mp3
                media_content_type: music

      - type: heading
        heading: 3D printer
        icon: phu:bambu-lab-alt
      - !include common/3d-printer.yaml
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.p2s_22e8bj630504658_printstatus
            state:
              - running
              - prepare
              - slicing
              - pause
              - init
        card:
          type: picture-entity
          entity: camera.p2s_22e8bj630504658_camera
          camera_view: live
          show_name: false
          show_state: false
      - type: custom:ha-bambulab-print_status-card
        printer: da36cd08f44b12c62604ccb31eaf0a27
        style: simple
