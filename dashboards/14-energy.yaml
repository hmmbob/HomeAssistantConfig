####################
# Energy             #
####################
path: energy
title: Energieverbruik
icon: mdi:home-lightning-bolt
cards:
  - type: vertical-stack
    cards:
      - type: markdown ## Energieverbruik header
        content: |
          # Energie
        uix:
          style:
            .: |
              ha-card {
                box-shadow: none;
                --ha-card-background: rgba(0, 0, 0, 0.0)
              }
            ha-markdown$: |
              h1 { 
                font-size: 18px !important;
                font-weight: 400 !important;
                padding-left: 10px !important;
                border-left: 3px solid rgba(81, 134, 236);
                }

      - type: tile
        entity: sensor.zonneplan_status_tip
        color: green
        show_entity_picture: false
        icon: mdi:head-lightbulb-outline
        name: Zonneplan advies

      - type: custom:mushroom-template-card
        primary: "Huidige productie: {{ states('sensor.pv_power')|float(0) }} W"
        secondary: |-
          {% set netverbruik = ((states('sensor.dsmr_reading_electricity_currently_delivered')  | float(0)) * 1000) | round(0, default=0) %}
          {% set teruglevering = ((states('sensor.dsmr_reading_electricity_currently_returned')  | float(0)) * 1000) | round(0, default=0) %}
          {% set verbruik = netverbruik - teruglevering %}
          Huidige  {{ 'afname' if verbruik > 0 else 'teruglevering' }}: {{ verbruik }} W
        entity: sensor.pv_power
        icon: mdi:solar-power
        icon_color: green

      - type: energy-distribution
        link_dashboard: true

      - type: custom:plotly-graph
        title: Electriciteitsprijs
        hours_to_show: 18
        time_offset: 17h
        fn: !include common/zonneplan-electricity-price-graph-fn.yaml
        layout:
          yaxis:
            fixedrange: true
            tickformat: .2f
            range: $fn ({vars}) => [ vars.ymin-0.02, vars.ymax+0.02 ]
          xaxis:
            tickformat: "%H:%M"
        config:
          displayModeBar: false
        entities:
          - entity: "" # Price columns
            unit_of_measurement: $ex vars.unit_of_measurement
            name: ""
            showlegend: false
            x: $ex vars.x
            "y": $ex vars.y
            marker:
              color: $ex vars.color
            type: bar
            hovertemplate: $ex vars.hover
          - entity: "" # MIN marker + legend
            mode: markers
            textposition: top
            showlegend: true
            name: >-
              $fn ({vars}) => vars.min.p.toFixed(3) + " " + vars.unit_of_measurement + "
              @ " + new Date(vars.min.t).toLocaleTimeString("nl-NL",
              {hour: "2-digit", minute: "2-digit"})
            yaxis: y0
            marker:
              symbol: diamond
              color: $ex vars.min.c
            x:
              - $ex vars.min.t
            "y":
              - $ex vars.min.p
          - entity: "" # MAX marker + legend
            mode: markers
            textposition: top
            showlegend: true
            name: >-
              $fn ({vars}) => vars.max.p.toFixed(3) + " " + vars.unit_of_measurement + "
              @ " + new Date(vars.max.t).toLocaleTimeString("nl-NL",
              {hour: "2-digit", minute: "2-digit"})
            yaxis: y0
            marker:
              symbol: diamond
              color: $ex vars.max.c
            x:
              - $ex vars.max.t
            "y":
              - $ex vars.max.p
          - entity: "" # NOW Line
            name: Now
            yaxis: y0
            showlegend: false
            line:
              width: 2
              dash: dot
              color: deepskyblue
            x: $ex [Date.now(), Date.now()]
            "y":
              - 0
              - 1
          - entity: "" # NOW Legend
            yaxis: y0
            mode: markers
            textposition: top
            showlegend: true
            name: >-
              $fn ({vars}) => "Nu: " + vars.p_now.toFixed(3) + " " + vars.unit_of_measurement
            marker:
              symbol: diamond
              color: deepskyblue
            x: $ex [Date.now(), Date.now()]
            "y":
              - $ex vars.p_now
          - entity: sensor.ev_smart_charging_charging # Charging schedule
            attribute: charging_schedule
            yaxis: y0
            name: EV Charging schedule
            fill: tozeroy
            line:
              color: grey
              dash: dot
              width: 1
            filters:
              - fn: |-
                  ({xs, ys, meta, states, statistics, hass, vars}) => {
                    const forecasts = hass.states['sensor.ev_smart_charging_charging'].attributes.charging_schedule;
                    res = {
                      xs: forecasts.map(fc => fc["start"]),
                      ys: forecasts.map(fc => fc["value"]),
                      meta: meta
                    };
                    return res;
                  }
