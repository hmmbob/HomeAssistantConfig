type: horizontal-stack
cards:
  - type: custom:mushroom-template-card
    primary: "3D printer stroom"
    secondary: >-
      {{ "Aan" if is_state(entity,'on') else "Uit" }} - {{ states('sensor.3d_printer_power', with_unit=True) }}
    entity: switch.3d_printer
    icon: >-
      {{ "mdi:printer-3d" if is_state(entity,'on') else "mdi:printer-3d-off" }}
    icon_color: >-
      {{ "green" if is_state(entity,'on') else "red" }}
    multiline_secondary: true
    tap_action:
      action: toggle
      confirmation:
        text: Weet je zeker dat je de 3D printer aan of uit wil zetten?
  - type: custom:mushroom-template-card
    primary: >-
      {{ state_translated('sensor.p2s_22e8bj630504658_printstatus') }}
    secondary: >-
      {% from 'relative_time_plus.jinja' import relative_time_plus %}
      {% set status = states('sensor.p2s_22e8bj630504658_printstatus') %}
      {% set active = ['running', 'prepare', 'slicing', 'pause', 'init'] %}
      {% if status in active %}
        {{ states('sensor.p2s_22e8bj630504658_printvoortgang') | int(0) }}% | Laag {{ states('sensor.p2s_22e8bj630504658_huidige_laag') }}/{{ states('sensor.p2s_22e8bj630504658_hoeveelheid_lagen') }} | nog {{ relative_time_plus(states('sensor.p2s_22e8bj630504658_eindtijd'), parts=1, abbr=true, language='nl', round_mode='ceil') }}
      {% elif status in ['finish', 'idle'] %}
        Bed {{ states('sensor.p2s_22e8bj630504658_bedtemperatuur', with_unit=True) }}
      {% else %}
        {{ states('sensor.3d_printer_power', with_unit=True) }}
      {% endif %}
    entity: sensor.p2s_22e8bj630504658_printstatus
    icon: phu:bambu-lab-alt
    icon_color: >-
      {% set status = states('sensor.p2s_22e8bj630504658_printstatus') %}
      {{ 'green' if status in ['finish', 'idle'] else
          'red' if status in ['running', 'prepare', 'slicing', 'pause', 'init', 'failed'] else
          'grey' }}
    badge_icon: >-
      {{ 'mdi:alert-circle' if is_state('binary_sensor.p2s_22e8bj630504658_hms_fouten', 'on') else
        'mdi:door-open' if is_state('binary_sensor.p2s_22e8bj630504658_enclosure_deur', 'on') else
        'mdi:wifi-off' if is_state('binary_sensor.p2s_22e8bj630504658_online', 'off') else
        'mdi:printer-3d' }}
    badge_color: >-
      {{ 'red' if is_state('binary_sensor.p2s_22e8bj630504658_hms_fouten', 'on') else
        'orange' if is_state('binary_sensor.p2s_22e8bj630504658_enclosure_deur', 'on') else
        'grey' if is_state('binary_sensor.p2s_22e8bj630504658_online', 'off') else
        'green' }}
    multiline_secondary: false
    tap_action:
      action: more-info
    hold_action:
      action: more-info
      entity: camera.p2s_22e8bj630504658_camera
